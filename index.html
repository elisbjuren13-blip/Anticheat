<!DOCTYPE html>
<html>
<head>
    <title>AC Owner Dashboard</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #0a0a0a; color: #00ff00; padding: 20px; }
        .log-entry { background: #1a1a1a; border: 1px solid #333; padding: 15px; margin-bottom: 10px; border-left: 5px solid #ff0000; }
        .player-name { font-weight: bold; color: #fff; font-size: 1.2em; }
        .reason { color: #ff4444; }
        h1 { border-bottom: 2px solid #00ff00; padding-bottom: 10px; }
    </style>
</head>
<body>
    <h1>SYSTEM MONITOR - ANTI-CHEAT OWNER PANEL</h1>
    <div id="logContainer">Väntar på data...</div>

    <script>
        async function fetchLogs() {
            const res = await fetch('/get-logs');
            const data = await res.json();
            const container = document.getElementById('logContainer');
            
            container.innerHTML = data.map(log => `
                <div class="log-entry">
                    <div>[${log.time}]</div>
                    <div class="player-name">Spelare: ${log.player} (ID: ${log.id})</div>
                    <div class="reason">Detektering: ${log.reason}</div>
                    <div>Detaljer: ${log.details}</div>
                    <button onclick="banPlayer('${log.id}')" style="margin-top:10px; background:red; color:white; border:none; padding:5px; cursor:pointer;">BAN PLAYER</button>
                </div>
            `).join('');
        }

        setInterval(fetchLogs, 2000); // Uppdatera varannan sekund
    </script>
</body>
</html>
